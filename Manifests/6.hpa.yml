apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wild-weekender-hpa
  namespace: wild-weekender
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wild-weekender-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
